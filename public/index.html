<!DOCTYPE html>
<html class="h-100" lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    <link href="https://use.fontawesome.com/releases/v7.0.0/css/all.css" rel="stylesheet">
    <script>
      (function () {
        try {
          var theme = window.localStorage.getItem('gorse-dashboard-theme');
          if (theme !== 'dark' && theme !== 'light') {
            theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
          var themeColorMeta = document.querySelector('meta[name="theme-color"]');
          if (themeColorMeta) {
            themeColorMeta.setAttribute('content', theme === 'dark' ? '#111827' : '#ffffff');
          }
        } catch (error) {
          // Ignore storage/media-query failures and let the app boot with its default theme.
        }
      }());
    </script>
    <title>Gorse Dashboard</title>
  </head>
  <body class="h-100">
    <noscript>
      <strong>We're sorry but Gorse Dashboard doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
